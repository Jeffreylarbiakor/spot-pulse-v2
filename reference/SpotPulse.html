<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Spot Pulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Mulish:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Spot Pulse — production build (navigation: bottom tab bar)
   EduSpots design-system tokens (single source of truth)
   ============================================================ */
:root{
  --green-700:#004C28; --green-500:#006B38; --green-400:#2C9159; --green-100:#C5E3D0; --green-50:#E8F4EC;
  --blue-700:#135A7C; --blue-500:#1E8FC0; --blue-400:#2BA8DB; --blue-100:#C5E9F6; --blue-50:#E8F6FC;
  --amber-700:#8A5208; --amber-600:#B26A0C; --amber-500:#D98512; --amber-100:#FCE7BF; --amber-50:#FEF6E8;
  --danger:#C7402F; --danger-50:#FBEAE7;
  --ink-900:#1C1C1C; --ink-800:#2D2D2D; --ink-700:#424242; --ink-600:#5C5C5C; --ink-500:#787878;
  --ink-400:#9B9B9B; --ink-300:#C7C7C5; --ink-200:#E4E3DF; --ink-100:#F1F0EC; --ink-50:#F8F7F3;
  --paper:#FBFAF6; --white:#FFFFFF;
  --text-strong:var(--ink-900); --text-body:var(--ink-800); --text-muted:var(--ink-500);
  --surface-page:var(--paper); --surface-card:var(--white); --surface-sunken:var(--ink-50);
  --border-subtle:var(--ink-200); --border-default:var(--ink-300);
  --brand:var(--green-500); --brand-hover:var(--green-700); --focus:var(--blue-400);
  --font-display:'Plus Jakarta Sans',system-ui,sans-serif;
  --font-body:'Mulish',system-ui,sans-serif;
  --font-mono:'Space Mono',ui-monospace,monospace;
  --r-xs:6px; --r-sm:10px; --r-md:14px; --r-lg:20px; --r-xl:28px; --r-pill:999px;
  --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:24px; --s6:32px; --s7:48px;
  --sh-xs:0 1px 2px rgba(28,28,28,.06); --sh-sm:0 2px 6px rgba(28,28,28,.07);
  --sh-md:0 8px 20px rgba(28,28,28,.09); --sh-lg:0 16px 40px rgba(28,28,28,.12);
  --sh-brand:0 10px 28px rgba(0,107,56,.22); --ring:0 0 0 3px rgba(43,168,219,.45);
  --ease:cubic-bezier(.16,1,.3,1);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:var(--font-body); color:var(--text-body); background:var(--paper); -webkit-font-smoothing:antialiased;}

/* App shell fills its frame (iframe / phone / standalone) */
.app{position:relative; height:100vh; min-height:100%; display:flex; flex-direction:column; overflow:hidden; background:
  radial-gradient(120% 70% at 50% -8%, var(--green-50), transparent 58%),
  radial-gradient(90% 50% at 100% 108%, var(--blue-50), transparent 52%), var(--paper);}
@media(min-width:840px){ .app{max-width:720px; margin:0 auto; border-left:1px solid var(--border-subtle); border-right:1px solid var(--border-subtle);} }

/* ---------- top app bar ---------- */
.topbar{flex:none; display:flex; align-items:center; gap:12px; padding:16px 18px 12px; }
.topbar .titles{flex:1; min-width:0}
.wordmark{font-family:var(--font-display); font-weight:800; font-size:21px; letter-spacing:-.02em; color:var(--text-strong); line-height:1;}
.wordmark b{color:var(--brand)}
.topbar .sub{font-size:11.5px; color:var(--text-muted); margin-top:3px}
.topbar .month{flex:none}

/* sub-screen back bar */
.subbar{flex:none; display:flex; align-items:center; gap:8px; padding:14px 14px 8px;}
.back{display:inline-flex; align-items:center; gap:6px; background:none; border:none; cursor:pointer;
  font-family:var(--font-display); font-weight:700; font-size:14px; color:var(--text-muted); padding:10px 8px; min-height:44px;}
.back:hover{color:var(--brand)}

/* ---------- scroll area ---------- */
.view{flex:1; overflow-y:auto; padding:4px 16px 24px; -webkit-overflow-scrolling:touch;}
.view:focus{outline:none}
.view.pad-bottom{padding-bottom:104px}      /* clears bottom tab bar */

/* month selector */
.months{display:inline-flex; background:var(--ink-100); border-radius:var(--r-pill); padding:3px; gap:2px;}
.months button{font-family:var(--font-display); font-weight:700; font-size:12px; border:none; background:none;
  color:var(--text-muted); padding:7px 11px; border-radius:var(--r-pill); cursor:pointer; min-height:34px;}
.months button[aria-pressed="true"]{background:var(--surface-card); color:var(--brand); box-shadow:var(--sh-xs);}

/* ---------- cards & primitives (from system) ---------- */
.eyebrow{font-family:var(--font-display); font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:.13em; color:var(--text-muted);}
.h-screen{font-family:var(--font-display); font-weight:800; font-size:23px; letter-spacing:-.02em; color:var(--text-strong); margin:0;}
.card{background:var(--surface-card); border:1px solid var(--border-subtle); border-radius:var(--r-lg); box-shadow:var(--sh-sm); padding:var(--s5);}
.section-title{font-family:var(--font-display); font-weight:800; font-size:15px; color:var(--text-strong); margin:0 4px 10px;}

.statgrid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.stat{background:var(--surface-card); border:1px solid var(--border-subtle); border-radius:var(--r-md); padding:13px 14px; box-shadow:var(--sh-xs);}
.stat .v{font-family:var(--font-mono); font-weight:700; font-size:25px; line-height:1; color:var(--text-strong);}
.stat .l{font-size:12px; color:var(--text-muted); margin-top:5px;}

.btn{font-family:var(--font-display); font-weight:700; font-size:15px; letter-spacing:-.01em; border-radius:var(--r-pill);
  border:2px solid transparent; cursor:pointer; min-height:48px; padding:12px 22px; display:inline-flex; align-items:center;
  justify-content:center; gap:8px; transition:background var(--ease) .2s, box-shadow var(--ease) .2s, transform .12s;}
.btn:active{transform:scale(.98)} .btn:focus-visible{outline:none; box-shadow:var(--ring)}
.btn-primary{background:var(--brand); color:#fff;} .btn-primary:hover{background:var(--brand-hover); box-shadow:var(--sh-brand)}
.btn-secondary{background:transparent; color:var(--brand); border-color:var(--brand);} .btn-secondary:hover{background:var(--green-50)}
.btn-block{width:100%} .btn[disabled]{opacity:.45; cursor:not-allowed; box-shadow:none!important}

.chip{display:inline-flex; align-items:center; gap:6px; font-family:var(--font-display); font-weight:700; font-size:13px;
  padding:6px 11px; border-radius:var(--r-pill); white-space:nowrap;}
.chip .dot{width:8px;height:8px;border-radius:50%}
.chip.green{background:var(--green-50); color:var(--green-700)} .chip.green .dot{background:var(--green-500)}
.chip.amber{background:var(--amber-50); color:var(--amber-700)} .chip.amber .dot{background:var(--amber-500)}
.chip.red{background:var(--danger-50); color:var(--danger)} .chip.red .dot{background:var(--danger)}

.tag{display:inline-flex; align-items:center; font-family:var(--font-display); font-weight:600; font-size:11px; padding:4px 10px; border-radius:var(--r-pill); background:var(--blue-50); color:var(--blue-700);}
.tag.induct{background:var(--amber-50); color:var(--amber-700)}
.tag.prog{background:var(--ink-100); color:var(--ink-700)}

.cluster-h{display:flex; justify-content:space-between; align-items:baseline; margin:20px 4px 8px;}
.cluster-h .name{font-family:var(--font-display); font-weight:800; font-size:15px; color:var(--text-strong);}
.cluster-h .rc{font-size:11.5px; color:var(--text-muted);}
.spotrow{display:flex; align-items:center; gap:12px; width:100%; text-align:left; cursor:pointer; background:var(--surface-card);
  border:1px solid var(--border-subtle); border-radius:var(--r-md); padding:13px 14px; margin-bottom:8px; min-height:60px;
  transition:box-shadow var(--ease) .2s, transform .12s, border-color .2s;}
.spotrow:hover{box-shadow:var(--sh-md); border-color:var(--green-100)}
.spotrow:active{transform:scale(.99)} .spotrow:focus-visible{outline:none; box-shadow:var(--ring)}
.spotrow .meta{flex:1; min-width:0}
.spotrow .sn{font-family:var(--font-display); font-weight:700; font-size:15px; color:var(--text-strong); display:flex; align-items:center; gap:8px; flex-wrap:wrap}
.spotrow .reg{font-size:12px; color:var(--text-muted); margin-top:2px}
.spotrow .chev{color:var(--ink-300); flex:none}

.legend{display:flex; flex-direction:column; gap:8px}
.legend .li{display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-body)}
.legend .sw{width:11px;height:11px;border-radius:3px}
.legend b{font-family:var(--font-mono); margin-left:auto; color:var(--text-strong)}

.bar-row{margin-bottom:13px}
.bar-row .top{display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:5px}
.bar-row .top .nm{color:var(--text-body); font-weight:600; font-family:var(--font-display)}
.bar-row .top .vl{font-family:var(--font-mono); color:var(--text-muted)}
.track{height:9px; background:var(--ink-100); border-radius:var(--r-pill); overflow:hidden}
.track > i{display:block; height:100%; border-radius:var(--r-pill); background:linear-gradient(90deg,var(--green-400),var(--green-500))}

.ring-wrap{display:flex; flex-direction:column; align-items:center; gap:8px; margin:6px 0 2px}
.ring{position:relative; width:150px; height:150px}
.ring .ctr{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center}
.ring .num{font-family:var(--font-mono); font-weight:700; font-size:44px; line-height:1; color:var(--text-strong)}
.ring .of{font-size:11px; color:var(--text-muted); font-family:var(--font-mono)}

.pillar{margin-bottom:14px}
.pillar .top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px}
.pillar .pn{font-family:var(--font-display); font-weight:700; font-size:13.5px; color:var(--text-body)}
.pillar .pv{font-family:var(--font-mono); font-size:13px; color:var(--text-muted)} .pillar .pv b{color:var(--text-strong)}

.idgrid{display:grid; grid-template-columns:1fr 1fr; gap:12px 16px; margin-top:4px}
.idgrid .k{font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-400); font-family:var(--font-display); font-weight:700}
.idgrid .vv{font-size:14px; color:var(--text-body); margin-top:2px; font-weight:600}

.trend{display:flex; align-items:center; gap:10px; justify-content:center}
.trend .pt{display:flex; flex-direction:column; align-items:center; gap:3px}
.trend .pt .mm{font-size:11px; color:var(--text-muted); font-family:var(--font-display); font-weight:700; text-transform:uppercase; letter-spacing:.06em}
.trend .pt .sc{font-family:var(--font-mono); font-weight:700; font-size:20px; color:var(--text-strong)}
.trend .arrow{font-size:13px; font-weight:700; font-family:var(--font-display)}
.trend .arrow.up{color:var(--green-500)} .trend .arrow.down{color:var(--danger)}

/* form */
.fsection > .lbl{font-family:var(--font-display); font-weight:800; font-size:13px; text-transform:uppercase; letter-spacing:.1em; color:var(--brand); margin:0 2px 10px;}
.field{display:flex; align-items:center; justify-content:space-between; gap:14px; padding:12px 0; border-bottom:1px solid var(--border-subtle);}
.field:last-child{border-bottom:none}
.field .fl{font-size:14px; color:var(--text-body); font-weight:600;}
.field .fl small{display:block; font-weight:400; color:var(--text-muted); font-size:11.5px; margin-top:1px}
.field.col{flex-direction:column; align-items:stretch}
.stepper{display:flex; align-items:center; background:var(--ink-50); border:1px solid var(--border-default); border-radius:var(--r-pill); padding:3px;}
.stepper button{width:38px;height:38px;border-radius:50%; border:none; background:var(--surface-card); font-size:20px; font-weight:700;
  color:var(--brand); cursor:pointer; box-shadow:var(--sh-xs); display:flex; align-items:center; justify-content:center; font-family:var(--font-display);}
.stepper button:hover{background:var(--green-50)} .stepper button:focus-visible{outline:none; box-shadow:var(--ring)}
.stepper button[disabled]{color:var(--ink-300); cursor:not-allowed; box-shadow:none}
.stepper .val{font-family:var(--font-mono); font-weight:700; font-size:16px; min-width:46px; text-align:center; color:var(--text-strong)}
.ninput{font-family:var(--font-mono); font-weight:700; font-size:16px; width:100%; text-align:left; padding:10px 14px;
  border:1.5px solid var(--border-default); border-radius:var(--r-md); background:var(--surface-card); color:var(--text-strong); min-height:46px;}
.ninput:focus{outline:none; border-color:var(--focus); box-shadow:var(--ring)}
.tinput{font-family:var(--font-body); font-size:14px; width:100%; padding:12px 14px; margin-top:8px; border:1.5px solid var(--border-default);
  border-radius:var(--r-md); background:var(--surface-card); color:var(--text-body); min-height:46px;}
.tinput:focus{outline:none; border-color:var(--focus); box-shadow:var(--ring)}
.toggle-row{display:flex; align-items:center; justify-content:space-between; gap:14px; padding:14px 0; border-bottom:1px solid var(--border-subtle);}
.toggle-row:last-child{border-bottom:none}
.toggle{position:relative; width:52px; height:30px; border-radius:var(--r-pill); background:var(--ink-300); border:none; cursor:pointer; flex:none; transition:background var(--ease) .2s;}
.toggle::after{content:""; position:absolute; top:3px; left:3px; width:24px; height:24px; border-radius:50%; background:#fff; box-shadow:var(--sh-sm); transition:transform var(--ease) .22s;}
.toggle[aria-checked="true"]{background:var(--green-500)} .toggle[aria-checked="true"]::after{transform:translateX(22px)}
.toggle:focus-visible{outline:none; box-shadow:var(--ring)}

/* sticky save bar (check-in) */
.savebar{flex:none; padding:12px 16px calc(12px + env(safe-area-inset-bottom)); background:linear-gradient(to top, var(--surface-page) 70%, rgba(251,250,246,0)); border-top:1px solid var(--border-subtle);}

/* timeline / about */
.timeline{position:relative; margin:6px 2px 2px; padding-left:30px}
.timeline::before{content:""; position:absolute; left:9px; top:6px; bottom:10px; width:2px; background:var(--green-100)}
.tl-step{position:relative; padding-bottom:20px}
.tl-step::before{content:""; position:absolute; left:-26px; top:2px; width:18px; height:18px; border-radius:50%; background:var(--surface-card); border:3px solid var(--green-500)}
.tl-step.future::before{border-color:var(--ink-300)}
.tl-step .ts{font-family:var(--font-display); font-weight:700; font-size:14.5px; color:var(--text-strong)}
.tl-step .td{font-size:12.5px; color:var(--text-muted); margin-top:2px; line-height:1.45}
.about-block{margin-bottom:20px} .about-block:last-child{margin-bottom:0}
.about-block h3{font-family:var(--font-display); font-weight:800; font-size:15px; color:var(--text-strong); margin:0 0 6px}
.about-block p{font-size:13.5px; line-height:1.6; color:var(--text-body); margin:0}
.weighttbl{display:flex; flex-direction:column; gap:7px; margin-top:10px}
.weighttbl .wr{display:flex; justify-content:space-between; font-size:13.5px}
.weighttbl .wr .wn{font-weight:600; color:var(--text-body)} .weighttbl .wr .ww{font-family:var(--font-mono); color:var(--brand); font-weight:700}
.ghlink{display:inline-flex; align-items:center; gap:8px; font-family:var(--font-display); font-weight:700; font-size:13px; color:var(--brand); text-decoration:none; padding:10px 0; min-height:44px}

/* in-screen disclaimer (footer of scroll content) */
.disclaimer{font-size:10.5px; line-height:1.45; color:var(--ink-400); text-align:center; padding:22px 10px 4px;}

/* ============================================================
   NAVIGATION — bottom tab bar with raised center action (Option A)
   ============================================================ */
.navicon{width:24px;height:24px;flex:none}
.chev{width:18px;height:18px;flex:none}
.tabbar{flex:none; display:flex; background:var(--surface-card); border-top:1px solid var(--border-subtle);
  padding:6px 6px calc(6px + env(safe-area-inset-bottom)); box-shadow:0 -2px 14px rgba(28,28,28,.05);}
.tabbar .tab{flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none; cursor:pointer;
  padding:7px 0 5px; color:var(--ink-500); min-height:54px; border-radius:var(--r-md); transition:color .18s;}
.tabbar .tab .lbl{font-family:var(--font-display); font-weight:700; font-size:10.5px; letter-spacing:.01em}
.tabbar .tab[aria-current="true"]{color:var(--brand)}
.tabbar .tab.center{position:relative}
.tabbar .tab.center .fab{width:52px;height:52px;border-radius:50%; background:var(--brand); color:#fff; display:flex; align-items:center; justify-content:center;
  box-shadow:var(--sh-brand); margin-top:-22px; border:4px solid var(--surface-card); transition:background .18s, transform .12s}
.tabbar .tab.center:active .fab{transform:scale(.94)}
.tabbar .tab.center:hover .fab{background:var(--brand-hover)}
.tabbar .tab.center .lbl{color:var(--brand)}

@keyframes pop{from{transform:scale(.95)} to{transform:scale(1)}}
.success-card{animation:pop .4s var(--ease) both}
@media(prefers-reduced-motion:reduce){ *{animation:none!important; transition:none!important} }
</style>
</head>

const PILLAR_DEFS=[['access','Access',25],['engagement','Engagement',20],['support','Support',25],['governance','Governance',30]];

/* ===================== helpers ===================== */
function allSpots(){return CLUSTERS.flatMap(c=>c.spots);}
function scoreOf(s){const p=s.pillars;return p.access+p.engagement+p.support+p.governance;}
function rag(s){ if(s>=75)return{key:'Green',label:'Green — healthy',cls:'green',c:'var(--green-500)'};
  if(s>=55)return{key:'Amber',label:'Amber — needs attention',cls:'amber',c:'var(--amber-500)'};
  return{key:'Red',label:'Red — at risk',cls:'red',c:'var(--danger)'};}
function findSpot(id){for(const c of CLUSTERS){const s=c.spots.find(x=>x.id===id);if(s)return{spot:s,cluster:c};}}
function esc(t){return String(t).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}

/* ---- per-month figures: everything on the dashboard is derived
        from each Spot's trend[] value for the selected month ---- */
function avg(arr){return arr.length?Math.round(arr.reduce((a,b)=>a+b,0)/arr.length):0;}
function networkStats(m){
  const reporting=allSpots().filter(s=>s.trend[m]!=null);
  let g=0,a=0,r=0;
  reporting.forEach(s=>{const k=rag(s.trend[m]).key; if(k==='Green')g++; else if(k==='Amber')a++; else r++;});
  return {total:allSpots().length, reporting:reporting.length, avg:avg(reporting.map(s=>s.trend[m])), g, a, r};
}
function clusterAvgs(m){
  return CLUSTERS.map(c=>{const rep=c.spots.filter(s=>s.trend[m]!=null).map(s=>s.trend[m]); return [c.name, avg(rep)];});
}

 home:'<path d="M3 9.6 12 3l9 6.6V20a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z"/>',

function icon(n,cls){return `<svg class="${cls||'navicon'}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICON[n]}</svg>`;}
function donut(g,a,r){const t=g+a+r||1,R=52,C=2*Math.PI*R,gap=2;
  const seg=(v,col,off)=>{const len=(v/t)*C;return `<circle r="${R}" cx="70" cy="70" fill="none" stroke="${col}" stroke-width="20" stroke-dasharray="${Math.max(len-gap,0)} ${C-Math.max(len-gap,0)}" stroke-dashoffset="${-off}"/>`;};
  let o=0;const A=seg(g,'var(--green-500)',o);o+=(g/t)*C;const B=seg(a,'var(--amber-500)',o);o+=(a/t)*C;const D=seg(r,'var(--danger)',o);
  return `<svg width="140" height="140" viewBox="0 0 140 140" style="transform:rotate(-90deg)">${A}${B}${D}</svg>`;}
function ringSVG(score){const r=rag(score),R=64,C=2*Math.PI*R,len=(score/100)*C;
  return `<svg width="150" height="150" viewBox="0 0 150 150" style="transform:rotate(-90deg)">
   <circle r="${R}" cx="75" cy="75" fill="none" stroke="var(--ink-100)" stroke-width="13"/>
   <circle r="${R}" cx="75" cy="75" fill="none" stroke="${r.c}" stroke-width="13" stroke-linecap="round" stroke-dasharray="${len} ${C-len}"/></svg>`;}

function render(){
  const flow=isFlow();
  let header;
  if(sub){
    const label = sub.type==='checkin' ? '← Cancel' : '← Back';
    header = `<div class="subbar"><button class="back" id="backBtn">${label}</button></div>`;
  } else {
    header = topbarHTML();
  }
  const viewCls = 'view' + (flow ? '' : ' pad-bottom');
  let footer='';
  if(sub && sub.type==='checkin'){ footer=`<div class="savebar"><button class="btn btn-primary btn-block" id="saveBtn">Save check-in</button></div>`; }
  else if(!flow){ footer=tabbarHTML(); }

  app.innerHTML = `${header}<main class="${viewCls}" id="view" tabindex="-1">${currentContent()}</main>${footer}`;

  // wire
  const view=document.getElementById('view'); if(view) view.scrollTop=0;
  const back=document.getElementById('backBtn'); if(back) back.onclick=()=>{ if(sub.type==='checkin'){ tab='checkin'; sub=null; render(); } else closeSub(); };
  const save=document.getElementById('saveBtn'); if(save) save.onclick=()=>{ sub={type:'success',id:formModel.spotId}; render(); };

  view.querySelectorAll('.stepper').forEach(st=>{
    const key=st.dataset.key,min=parseFloat(st.dataset.min),step=parseFloat(st.dataset.step),val=st.querySelector('.val');
    const upd=()=>{val.textContent=formModel[key];st.querySelector('.dec').disabled=formModel[key]<=min;};
    st.querySelector('.inc').onclick=()=>{formModel[key]=+(formModel[key]+step).toFixed(1);upd();};
    st.querySelector('.dec').onclick=()=>{if(formModel[key]>min){formModel[key]=+(formModel[key]-step).toFixed(1);upd();}};
    upd();
  });
  view.querySelectorAll('[data-toggle]').forEach(t=>{t.onclick=()=>{const k=t.dataset.toggle;formModel[k]=!formModel[k];t.setAttribute('aria-checked',formModel[k]);};});
  view.querySelectorAll('[data-num]').forEach(n=>{n.oninput=()=>{formModel[n.dataset.num]=+n.value||0;};});
  const ta=view.querySelector('[data-text]'); if(ta) ta.oninput=()=>{formModel.achievement=ta.value;};
}
render();
</script>
</body>
</html>
